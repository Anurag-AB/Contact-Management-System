<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content)">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title th:text="${title}">Base Page</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="fixed-top  navbar navbar-expand-lg navbar-dark bg-primary">
    <a class="navbar-brand" href="#">Smart Contact Manager</a>

    <button class="navbar-toggler" type="button" data-toggle="collapse"
            data-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ml-auto text-uppercase">

            <li class="nav-item">
                <a class="nav-link" th:href="@{/}">Home</a>
            </li>

            <li class="nav-item">
                <a class="nav-link">
                    <span th:text="${user.name}"></span>
                </a>
            </li>

            <!-- Logout -->
            <li class="nav-item">
                <form th:action="@{/logout}" method="post">
                    <button class="nav-link btn btn-link text-white text-uppercase"
                            style="text-decoration:none;">
                        <i class="fas fa-right-from-bracket mr-2"></i> Logout
                    </button>
                </form>
            </li>

        </ul>
    </div>
</nav>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar mt-2">
	<span onclick="toggleSidebar()" class="crossBtn">&times;</span>

    <a href="#" th:href="@{/user/index}" class="item">
        <i class="fas fa-home"></i>
        <span>Home</span>
    </a>

    <a href="#" th:href="@{/user/show-contacts/0}" class="item">
        <i class="fas fa-address-book"></i>
        <span>View Contacts</span>
    </a>

    <a href="#" th:href="@{/user/add-contact}" class="item">
        <i class="fas fa-user-plus"></i>
        <span>Add Contacts</span>
    </a>

    <a href="#" th:href="@{/user/profile}" class="item">
        <i class="fas fa-user-circle"></i>
        <span>Your Profile</span>
    </a>

    <a href="#" th:href="@{/user/setting}" class="item">
        <i class="fas fa-cog"></i>
        <span>Settings</span>
    </a>

    <!-- Logout (correct way) -->
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="logout-btn">
            <i class="fas fa-right-from-bracket"></i>
            <span>LOGOUT</span>
        </button>
    </form>

    <div class="divider"></div>

</div>

<!-- ================= CONTENT ================= -->
<div class="content mt-5">
	
	<i onclick="toggleSidebar()" class="fas fa-bars mt-3 ml-3"></i>
	
	<!-- message box -->
<div class="container" th:if="${message}">
    <div th:class="'alert ' + ${alertClass} + ' text-center'" role="alert">
        <span th:text="${message}"></span>
    </div>
</div>
	
		
    <div th:replace="${content}"></div>
</div>

<!-- ================= JS ================= -->
<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>

<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>

<script type="text/javascript">
  function deleteContact(cId){
  swal({
  title: "Are you sure?",
  text: "You want to delete this contact!!",
  icon: "warning",
  buttons: true,
  dangerMode: true,
})
.then((willDelete) => {
  if (willDelete) {
    window.location="/user/delete/" + cId;
  } else {
    swal("Your Contact is safe!");
  }
});
  }

</script>

<script th:src="@{/js/script.js}"></script>

</body>
</html>
