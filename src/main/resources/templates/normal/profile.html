<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="normal/base::layout(~{::section})">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Profile Page</title>
</head>
<body>

<section>
    <div class="container">
        <h2 class="text-center">User Profile</h2>

        <div class="card mt-4 p-4">
           <div class="text-center">
            <!-- Profile Image -->
            <img th:src="${user.imageUrl} != null ? 
              @{/img/{img}(img=${user.imageUrl})} : 
              @{/img/user.png}"
     alt="profile"
     style="width:150px;height:150px;border-radius:50%;">
</div> 
            <!-- User Details -->
            <div class="mt-4">

                <p><strong>ID:</strong> <span th:text="${user.id}"></span></p>

                <p><strong>Name:</strong> 
                    <span th:text="${user.name}"></span>
                </p>

                <p><strong>Email:</strong> 
                    <span th:text="${user.email}"></span>
                </p>

                <p><strong>Role:</strong> 
                    <span th:text="${user.role}"></span>
                </p>

                <p><strong>Status:</strong> 
                    <span th:text="${user.enabled} ? 'Active' : 'Inactive'"></span>
                </p>

                <p><strong>About:</strong></p>
                <p th:text="${user.about}"></p>

            </div>

        </div>


        </div>

    </div>
</section>

</body>
</html>
