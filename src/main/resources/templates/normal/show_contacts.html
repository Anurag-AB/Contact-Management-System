<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{normal/base::layout(~{::section})}">
<head>
<meta charset="UTF-8">
<title th:text="${title}">Show Contacts</title>
</head>

<body>
<section>

<div class="card mr-3 ml-3">
<div class="card-body">

<h1 class="text-center">Your Contacts</h1>

<!-- SEARCH -->
<div class="search-container my-3">
<input onkeyup="search()" id="search-input" type="text" class="form-control" placeholder="search your contact">
<div class="search-result">
<h3>this is result</h3>
</div>
</div>

<table class="table">
  <thead>
    <tr>
      <th scope="col">ID</th>
      <th scope="col">Name</th>
      <th scope="col">Email</th>
      <th scope="col">Phone</th>
      <th scope="col">Action</th>
    </tr>
  </thead>

  <tbody>
    <!-- ✅ FIX: use contacts.content -->
    <tr th:each="c : ${contacts.content}">
      
      <!-- ✅ FIX: c.cId -->
      <th scope="row" th:text="${'SCMUSER' + c.cId}"></th>

      <td>
        <img alt="profile photo"
             class="my_profile_picture"
             th:src="@{'/img/' + ${c.image}}">
        <span th:text="${c.name}"></span>
      </td>

      <td>
        <!-- ✅ FIX: correct URL -->
        <a th:href="@{'/user/' + ${c.cId} + '/contact'}">
          <span th:text="${c.email}"></span>
        </a>
      </td>

      <td th:text="${c.phone}"></td>

      <td>
  <div class="d-flex gap-3">
    
    <a href="#" 
       th:onclick="|deleteContact(${c.cId})|" 
       class="btn btn-danger btn-sm mr-2">
       Delete
    </a>

    <form method="post" th:action="@{'/user/update-contact/'+${c.cId}}">
      <button  type="submit" class="btn btn-primary btn-sm">
        Update
      </button>
    </form>

  </div>
</td>

    </tr>
  </tbody>
</table>

<!-- ✅ SHOW pagination only if pages > 0 -->
<nav aria-label="Page navigation example"
     th:if="${totalPages > 0}">

  <ul class="pagination">

    <!-- Previous -->
    <li th:if="${currentPage > 0}" class="page-item">
      <a th:href="@{'/user/show-contacts/' + ${currentPage-1}}"
         class="page-link">
        Previous
      </a>
    </li>

    <!-- Page numbers -->
    <li th:each="i : ${#numbers.sequence(1, totalPages)}"
        th:classappend="${currentPage == i-1 ? 'active' : ''}"
        class="page-item">

      <a th:href="@{'/user/show-contacts/' + ${i-1}}"
         class="page-link">
        <span th:text="${i}"></span>
      </a>
    </li>

    <!-- Next -->
    <li th:if="${currentPage + 1 < totalPages}" class="page-item">
      <a th:href="@{'/user/show-contacts/' + ${currentPage+1}}"
         class="page-link">
        Next
      </a>
    </li>

  </ul>
</nav>

</div>
</div>

</section>
</body>
</html>
