<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}"
	>
<head>
<meta charset="UTF-8">
<title th:text="${title}">signup page</title>
</head>
<body>
	<section>

		<div class="container">
			<div class="row">
				<div class="col-md-6 offset-md-3">
					<div class="my-card mt-3">
					
						<div class="text-center">
						<div  th:if="${message}" th:classappend="${message.type}" class="alert" >
						<p th:text="${message.content}"></p>
						</div>
						</div>

						<div class="container text-center">
							<img class="" style="width: 80px;" src=""
								th:src="@{/img/registration.png}" />
						</div>

						<h1 class="text-center">Register Here!!</h1>

						<form novalidate th:action="@{/do_register}" method="post"
							th:object="${user}">
							<!-- name field -->
							<div class="form-group">
								<label for="name_field">Name</label> <input name="name"
									type="text" class="form-control "  
									th:classappend="${#fields.hasErrors('name')?'is-invalid':''}"
									id="name_field"
									aria-describedby="emailHelp" placeholder="Enter Here" required
									th:value="${user.name}">
									
									<div class="invalid-feedback" th:each="e :${#fields.errors('name')}" th:text="${e}">
									
									</div>
							</div>
							<!-- email field -->
							<div class="form-group">
								<label for="email_field"> Email</label> <input name="email"
									type="email" class="form-control" id="email_field"
									aria-describedby="emailHelp" placeholder="Enter Email" required
									th:value="${user.email}">
							</div>
							<!-- password field -->
							<div class="form-group">
								<label for="password_field"> Password</label> <input
									name="password" type="password" class="form-control"
									id="password_field" autocomplete="new-password"
									aria-describedby="emailHelp" placeholder="Enter password"
									required>
							</div>

							<!-- user about field -->
							<div class="form-group">
								<textarea name="about" placeholder="Enter something yourself"
									rows="10" class="form-control" th:text="${user.about}"></textarea>
							</div>

							<!-- term and condition agreement -->

							<div class="form-group form-check text-center">
								<input type="checkbox" name="agreement" class="form-check-input"
									id="agreement" /> <label for="agreement">Accept
									terms and conditions</label>

							</div>

							<div class="container text-center">
								<button type="submit"
									class="btn bg-primary text-white btn-block">Submit</button>

								<button type="reset" class="btn btn-warning btn-block">Reset</button>
							</div>

						</form>



					</div>
				</div>
			</div>
		</div>

	</section>
</body>
</html>
