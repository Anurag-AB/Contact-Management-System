<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reports</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: #f5f7fa;
        }

        .card {
            border: none;
            border-radius: 12px;
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <h2 class="mb-4">Reports Dashboard</h2>

    <!-- 🔹 PIE CHART -->
    <div class="card mb-4">
        <h5>User Status (Active vs Inactive)</h5>
        <canvas id="pieChart"></canvas>
    </div>

    <!-- 🔹 BAR CHART -->
    <div class="card mb-4">
        <h5>User Overview</h5>
        <canvas id="barChart"></canvas>
    </div>

</div>

<script th:inline="javascript">
    // Spring Boot data
    let totalUsers = [[${totalUsers}]];
    let activeUsers = [[${activeUsers}]];
    let inactiveUsers = [[${inactiveUsers}]];

    // ========================
    // PIE CHART
    // ========================
    new Chart(document.getElementById('pieChart'), {
        type: 'pie',
        data: {
            labels: ['Active Users', 'Inactive Users'],
            datasets: [{
                data: [activeUsers, inactiveUsers],
                backgroundColor: ['#28a745', '#dc3545']
            }]
        }
    });

    // ========================
    // BAR CHART
    // ========================
    new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: {
            labels: ['Total Users', 'Active Users', 'Inactive Users'],
            datasets: [{
                label: 'Users',
                data: [totalUsers, activeUsers, inactiveUsers],
                backgroundColor: ['#007bff', '#28a745', '#dc3545']
            }]
        }
    });
</script>

</body>
</html>
