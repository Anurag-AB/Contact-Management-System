<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Admin Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }

        .dashboard-card {
            border: none;
            border-radius: 15px;
            transition: 0.3s;
            cursor: pointer;
            text-align: center;
            padding: 30px;
            color: white;
        }

        .dashboard-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .card-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .bg-user { background: linear-gradient(45deg, #007bff, #00c6ff); }
        .bg-view { background: linear-gradient(45deg, #28a745, #85e085); }
        .bg-dashboard { background: linear-gradient(45deg, #ffc107, #ffdd57); color:black; }
        .bg-reports { background: linear-gradient(45deg, #dc3545, #ff6b6b); }
    </style>
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand">
            <i class="fa fa-user-shield"></i> Admin Panel
        </a>

        <form th:action="@{/logout}" method="post">
            <button class="btn btn-danger">
                <i class="fa fa-sign-out-alt"></i> Logout
            </button>
        </form>
    </div>
</nav>

<!-- DASHBOARD -->
<div class="container mt-5">

    <h3 class="text-center mb-4">Welcome to Admin Dashboard</h3>

    <div class="row g-4">

        <!-- User Management -->
        <div class="col-md-3">
            <a th:href="@{/admin/manage-users}" class="text-decoration-none">
                <div class="dashboard-card bg-user">
                    <div class="card-icon">
                        <i class="fa fa-users"></i>
                    </div>
                    <h5>User Management</h5>
                </div>
            </a>
        </div>

        <!-- View Users -->
        <div class="col-md-3">
            <a th:href="@{/admin/view-users}" class="text-decoration-none">
                <div class="dashboard-card bg-view">
                    <div class="card-icon">
                        <i class="fa fa-list"></i>
                    </div>
                    <h5>View All Users</h5>
                </div>
            </a>
        </div>

        <!-- Dashboard -->
        <div class="col-md-3">
            <a th:href="@{/admin/admin-dashboard}" class="text-decoration-none">
                <div class="dashboard-card bg-dashboard">
                    <div class="card-icon">
                        <i class="fa fa-chart-line"></i>
                    </div>
                    <h5>Dashboard</h5>
                </div>
            </a>
        </div>

        <!-- Reports -->
        <div class="col-md-3">
            <a th:href="@{/admin/reports}" class="text-decoration-none">
                <div class="dashboard-card bg-reports">
                    <div class="card-icon">
                        <i class="fa fa-file-alt"></i>
                    </div>
                    <h5>Reports</h5>
                </div>
            </a>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
