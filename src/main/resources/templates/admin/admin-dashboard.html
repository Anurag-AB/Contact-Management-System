<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }
        .card {
            border: none;
            border-radius: 12px;
        }
        .card h3 {
            font-weight: bold;
        }
        .section-title {
            margin-top: 30px;
            margin-bottom: 15px;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <h2 class="mb-4">Admin Dashboard</h2>

    <!-- 🔹 STATS CARDS -->
    <div class="row g-4">

        <div class="col-md-4">
            <div class="card bg-primary text-white p-4">
                <h5>Total Users</h5>
                <h3 th:text="${totalUsers}">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-success text-white p-4">
                <h5>Active Users</h5>
                <h3 th:text="${activeUsers}">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-dark text-white p-4">
                <h5>Total Contacts</h5>
                <h3 th:text="${contactsCount}">0</h3>
            </div>
        </div>

    </div>

    <!-- 🔹 QUICK ACTIONS -->
    <h4 class="section-title">Quick Actions</h4>

    <div class="mb-3">
        <a href="/admin/manage-users" class="btn btn-dark me-2">Manage Users</a>
        <a href="/admin/view-users" class="btn btn-primary me-2">View Users</a>
        <a href="/signup" class="btn btn-success">Add New User</a>
    </div>

    <!-- 🔹 RECENT USERS -->
    <h4 class="section-title">Recent Activity (New Users)</h4>

    <div class="card p-3">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="u : ${recentUsers}">
                    <td th:text="${u.name}"></td>
                    <td th:text="${u.email}"></td>
                    <td>
                        <span th:if="${u.enabled}" class="badge bg-success">Active</span>
                        <span th:if="${!u.enabled}" class="badge bg-danger">Disabled</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
