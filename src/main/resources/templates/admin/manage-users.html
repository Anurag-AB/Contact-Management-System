<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body style="background:#f5f7fa;">

<div class="container mt-5">

    <div class="text-center mb-4">
        <h2 class="fw-bold">User Management</h2>
    </div>

    <div class="card shadow border-0">
        <div class="card-body">

            <!-- Flash Message -->
            <div th:if="${message}"
                 class="alert text-center"
                 th:classappend="'alert-' + ${messageType}">
                <span th:text="${message}"></span>
            </div>

            <div class="table-responsive">
                <table class="table table-hover text-center align-middle">

                    <thead class="table-dark">
                        <tr>
                            <th>Sl.No</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody>

                        <tr th:each="user, stat : ${users}">

                            <td th:text="${stat.count}"></td>
                            <td th:text="${user.name}"></td>
                            <td th:text="${user.email}"></td>

                            <td>

                                <!-- Update -->
                                <a th:if="${user.role != 'ROLE_ADMIN'}"
                                   th:href="@{'/admin/update-user/' + ${user.id}}"
                                   class="btn btn-warning btn-sm me-1">
                                    Update
                                </a>

                                <!-- Delete -->
                                <button th:if="${user.role != 'ROLE_ADMIN'}"
                                        class="btn btn-danger btn-sm me-1"
                                        th:onclick="'confirmDelete(' + ${user.id} + ')'">
                                    Delete
                                </button>

                                <!-- Toggle Active/Inactive -->
                                <a th:if="${user.role != 'ROLE_ADMIN'}"
                                   th:href="@{'/admin/toggle-user-status/' + ${user.id}}"
                                   class="btn btn-sm"
                                   th:classappend="${user.enabled} ? 'btn-danger' : 'btn-success'">

                                    <span th:if="${user.enabled}">Deactivate</span>
                                    <span th:if="${!user.enabled}">Activate</span>

                                </a>

                            </td>

                        </tr>

                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="4" class="text-muted">No users found</td>
                        </tr>

                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

<script>
function confirmDelete(id) {
    Swal.fire({
        title: 'Are you sure?',
        text: "This user will be permanently deleted!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#6c757d',
        confirmButtonText: 'Yes, delete it!'
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = "/admin/delete-user/" + id;
        }
    });
}
</script>

</body>
</html>
